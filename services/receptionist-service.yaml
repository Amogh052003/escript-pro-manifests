apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: escriptpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: amoghlokhande/escriptpro-frontend:fixed
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: escriptpro
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80