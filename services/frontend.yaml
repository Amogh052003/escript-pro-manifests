apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: escriptpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: amoghlokhande/escriptpro-frontend:fixed
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: escriptpro
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80