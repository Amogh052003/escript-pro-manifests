apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: escriptpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: amoghlokhande/escriptpro-frontend:fixed
        ports:
        - containerPort: 80

        # 👇 ensures latest image is always pulled (important for updates)
        imagePullPolicy: Always

        # 👇 basic health check (optional but recommended)
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: escriptpro
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80