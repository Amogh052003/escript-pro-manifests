apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice
  namespace: escriptpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authservice
  template:
    metadata:
      labels:
        app: authservice
    spec:
      initContainers:
      - name: wait-for-postgres
        image: alpine:3.19
        command:
          - sh
          - -c
          - |
            apk add --no-cache bind-tools netcat-openbsd
            until nslookup postgres; do sleep 2; done;
            until nc -z postgres 5432; do sleep 2; done;

      containers:
      - name: authservice
        image: amoghlokhande/escriptpro-authservice
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
---
apiVersion: v1
kind: Service
metadata:
  name: authservice
  namespace: escriptpro
spec:
  selector:
    app: authservice
  ports:
    - port: 8080
      targetPort: 8080