apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: escriptpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      initContainers:
      - name: wait-for-postgres
        image: alpine:3.19
        command:
          - sh
          - -c
          - |
            apk add --no-cache bind-tools netcat-openbsd
            until nslookup postgres; do sleep 2; done;
            until nc -z postgres 5432; do sleep 2; done;

      containers:
      - name: patient-service
        image: amoghlokhande/escriptpro-patient-service
        ports:
        - containerPort: 8082
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: escriptpro
spec:
  selector:
    app: patient-service
  ports:
    - port: 8082
      targetPort: 8082